<svg xmlns="http://www.w3.org/2000/svg" width="980" height="260" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
<title id="title">Automated content analysis workflow</title>
<desc id="desc">A seven-step workflow from research question to reporting.</desc>
<style>
  .box{fill:#f8f8f8;stroke:#222;stroke-width:2;rx:12;ry:12}.txt{font:16px sans-serif;fill:#111}.small{font:13px sans-serif;fill:#444}.arrow{stroke:#222;stroke-width:2;marker-end:url(#m)}
</style>
<defs><marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#222"/></marker></defs>
<rect x="18" y="58" width="120" height="110" class="box"/><text x="78" y="92" text-anchor="middle" class="txt">Research</text><text x="78" y="116" text-anchor="middle" class="txt">question</text><text x="78" y="144" text-anchor="middle" class="small">constructs</text>
<line x1="138" y1="113" x2="172" y2="113" class="arrow"/>
<rect x="172" y="58" width="120" height="110" class="box"/><text x="232" y="94" text-anchor="middle" class="txt">Codebook</text><text x="232" y="122" text-anchor="middle" class="small">rules + examples</text><text x="232" y="145" text-anchor="middle" class="small">for humans/models</text>
<line x1="292" y1="113" x2="326" y2="113" class="arrow"/>
<rect x="326" y="58" width="120" height="110" class="box"/><text x="386" y="94" text-anchor="middle" class="txt">Sampling</text><text x="386" y="122" text-anchor="middle" class="small">train/dev/test</text><text x="386" y="145" text-anchor="middle" class="small">out-of-sample</text>
<line x1="446" y1="113" x2="480" y2="113" class="arrow"/>
<rect x="480" y="58" width="120" height="110" class="box"/><text x="540" y="94" text-anchor="middle" class="txt">Annotation</text><text x="540" y="122" text-anchor="middle" class="small">pilot + adjudicate</text><text x="540" y="145" text-anchor="middle" class="small">gold standard</text>
<line x1="600" y1="113" x2="634" y2="113" class="arrow"/>
<rect x="634" y="58" width="120" height="110" class="box"/><text x="694" y="94" text-anchor="middle" class="txt">Models</text><text x="694" y="122" text-anchor="middle" class="small">LLM, SLM, hybrid</text><text x="694" y="145" text-anchor="middle" class="small">document versions</text>
<line x1="754" y1="113" x2="788" y2="113" class="arrow"/>
<rect x="788" y="58" width="160" height="110" class="box"/><text x="868" y="94" text-anchor="middle" class="txt">Validation</text><text x="868" y="122" text-anchor="middle" class="small">per-class metrics</text><text x="868" y="145" text-anchor="middle" class="small">error analysis</text>
<path d="M868 168 V215 H80 V175" fill="none" class="arrow"/><text x="475" y="236" text-anchor="middle" class="small">Iterate until the measurement is defensible; then scale and report.</text>
</svg>